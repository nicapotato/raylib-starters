name: Quickstart Go CI/CD - itch.io

on:
  workflow_dispatch:
    inputs:
      build_platform:
        description: 'Platform to build'
        required: false
        default: 'all'
        type: choice
        options:
          - macos
          - windows
          - all
      env:
        description: 'Environment (dev or prod)'
        required: false
        default: 'prod'
        type: choice
        options:
          - dev
          - prod
      version:
        description: 'Version override (leave empty to use project.conf)'
        required: false
        default: ''
        type: string
      channel:
        description: 'itch.io channel name override (optional)'
        required: false
        default: ''
        type: string
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'quickstart-go/**'

permissions:
  contents: read
  id-token: write

env:
  PROJECT_DIR: quickstart-go
  ITCH_USER: nicapotato
  ITCH_GAME: quickstart-go
  ENV: ${{ github.event.inputs.env || 'prod' }}
  AWS_REGION: eu-west-2
  S3_CATEGORY: apps
  S3_MATURITY: quickstart
  S3_GAME_KEY: quickstart-go
  S3_DISPLAY_NAME: 'Raylib quickstart (Go)'
  S3_IFRAME_WIDTH: '800'
  S3_IFRAME_HEIGHT: '600'
  PUBLISH_ITCH: 'true'
  PUBLISH_S3: 'true'

jobs:
  resolve-publish-flags:
    runs-on: ubuntu-latest
    outputs:
      publish_s3: ${{ steps.flags.outputs.publish_s3 }}
    steps:
      - id: flags
        run: echo "publish_s3=${PUBLISH_S3}" >> "$GITHUB_OUTPUT"

  build-and-push-macos:
    runs-on: macos-latest
    timeout-minutes: 45
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.build_platform == 'macos' ||
      github.event.inputs.build_platform == 'all'
    outputs:
      version: ${{ steps.setup.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup deployment
        uses: ./.github/actions/build-go-project
        id: setup
        with:
          project_dir: ${{ env.PROJECT_DIR }}
          itch_user: ${{ env.ITCH_USER }}
          itch_game: ${{ env.ITCH_GAME }}
          build_platform: macos
          env: ${{ env.ENV }}
          channel: ${{ github.event.inputs.channel }}
          version_override: ${{ github.event.inputs.version }}
          butler_api_key: ${{ secrets.BUTLER_API_KEY }}
          deployment_only: 'true'
          publish_itch: ${{ env.PUBLISH_ITCH }}

      - name: Build macOS executable
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "🔨 Building macOS executable..."
          mkdir -p bin
          
          CGO_ENABLED=1 go build -o bin/raylib-quickstart-go main.go
          
          codesign -s - -f bin/raylib-quickstart-go
          codesign --verify bin/raylib-quickstart-go
          echo "✅ Binary signed and verified"
          
          if [ -d "resources" ]; then
            mkdir -p bin/resources
            cp -r resources/* bin/resources/
            if [ -f "../resources/crystal_cave_track.mp3" ]; then
              cp ../resources/crystal_cave_track.mp3 bin/resources/ || true
            fi
          fi
          
          echo "✅ macOS executable build complete"

      - name: Package macOS build (.app for Finder icon)
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "📦 Creating .app bundle and zip..."
          make app-bundle
          ZIP_NAME="quickstart-go-macos.zip"
          rm -f "${ZIP_NAME}"
          zip -r "${ZIP_NAME}" "raylib-quickstart-go.app"
          echo "✅ Package created: ${ZIP_NAME}"

      - name: Push to itch.io (macOS)
        uses: ./.github/actions/build-go-project
        with:
          project_dir: ${{ env.PROJECT_DIR }}
          itch_user: ${{ env.ITCH_USER }}
          itch_game: ${{ env.ITCH_GAME }}
          build_platform: macos
          env: ${{ env.ENV }}
          channel: ${{ github.event.inputs.channel }}
          version_override: ${{ steps.setup.outputs.version || github.event.inputs.version }}
          butler_api_key: ${{ secrets.BUTLER_API_KEY }}
          package_file: quickstart-go-macos.zip
          deployment_only: 'true'
          publish_itch: ${{ env.PUBLISH_ITCH }}

      - name: Upload macOS zip artifact (S3 publish)
        if: env.PUBLISH_S3 == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-go-macos-zip
          path: ${{ env.PROJECT_DIR }}/quickstart-go-macos.zip
          if-no-files-found: error

  build-and-push-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.build_platform == 'windows' ||
      github.event.inputs.build_platform == 'all'
    outputs:
      version: ${{ steps.setup.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup deployment
        uses: ./.github/actions/build-go-project
        id: setup
        with:
          project_dir: ${{ env.PROJECT_DIR }}
          itch_user: ${{ env.ITCH_USER }}
          itch_game: ${{ env.ITCH_GAME }}
          build_platform: windows
          env: ${{ env.ENV }}
          channel: ${{ github.event.inputs.channel }}
          version_override: ${{ github.event.inputs.version }}
          butler_api_key: ${{ secrets.BUTLER_API_KEY }}
          deployment_only: 'true'
          publish_itch: ${{ env.PUBLISH_ITCH }}

      - name: Build Windows executable
        working-directory: ${{ env.PROJECT_DIR }}
        shell: bash
        run: |
          echo "🔨 Building Windows executable..."
          mkdir -p bin
          
          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 go build -o bin/quickstart-go.exe main.go
          
          if [ -d "resources" ]; then
            mkdir -p bin/resources
            cp -r resources/* bin/resources/
            if [ -f "../resources/crystal_cave_track.mp3" ]; then
              cp ../resources/crystal_cave_track.mp3 bin/resources/ || true
            fi
          fi
          
          echo "✅ Windows executable build complete"

      - name: Package Windows build
        working-directory: ${{ env.PROJECT_DIR }}
        shell: pwsh
        run: |
          echo "📦 Packaging Windows build..."
          $ZIP_NAME = "quickstart-go-windows.zip"
          
          if (Test-Path "bin") {
            $SOURCE_DIR = "bin"
          } else {
            Write-Host "❌ Error: No build output directory found"
            exit 1
          }
          
          Compress-Archive -Path "${SOURCE_DIR}\*" -DestinationPath $ZIP_NAME -Force
          echo "✅ Package created: $ZIP_NAME"

      - name: Push to itch.io (Windows)
        uses: ./.github/actions/build-go-project
        with:
          project_dir: ${{ env.PROJECT_DIR }}
          itch_user: ${{ env.ITCH_USER }}
          itch_game: ${{ env.ITCH_GAME }}
          build_platform: windows
          env: ${{ env.ENV }}
          channel: ${{ github.event.inputs.channel }}
          version_override: ${{ steps.setup.outputs.version || github.event.inputs.version }}
          butler_api_key: ${{ secrets.BUTLER_API_KEY }}
          package_file: quickstart-go-windows.zip
          deployment_only: 'true'
          publish_itch: ${{ env.PUBLISH_ITCH }}

      - name: Upload Windows zip artifact (S3 publish)
        if: env.PUBLISH_S3 == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-go-windows-zip
          path: ${{ env.PROJECT_DIR }}/quickstart-go-windows.zip
          if-no-files-found: error

  publish-s3:
    runs-on: ubuntu-latest
    needs: [resolve-publish-flags, build-and-push-macos, build-and-push-windows]
    if: |
      needs.resolve-publish-flags.outputs.publish_s3 == 'true' &&
      github.event_name != 'workflow_dispatch' &&
      needs.build-and-push-macos.result == 'success' &&
      needs.build-and-push-windows.result == 'success'
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PUBLIC_SOFTWARE_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Upload zips, checksums, merge catalog
        env:
          BUCKET: ${{ secrets.S3_PUBLIC_SOFTWARE_BUCKET }}
          VERSION: ${{ needs.build-and-push-macos.outputs.version }}
          GAME_KEY: ${{ env.S3_GAME_KEY }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          set -euo pipefail
          BUCKET="${BUCKET:-prod-nicapotato-public-software}"
          GAME="${GAME_KEY}"
          VER="${VERSION}"
          REGION="${AWS_REGION}"
          BASE="https://${BUCKET}.s3.${REGION}.amazonaws.com"
          CATEGORY="${{ env.S3_CATEGORY }}"
          MATURITY="${{ env.S3_MATURITY }}"
          PREFIX="${CATEGORY}/${MATURITY}/${GAME}/${VER}"
          CATALOG_KEY="${CATEGORY}/${MATURITY}/catalog.json"

          MZIP="dist/quickstart-go-macos-zip/quickstart-go-macos.zip"
          WINZIP="dist/quickstart-go-windows-zip/quickstart-go-windows.zip"

          test -f "$MZIP" && test -f "$WINZIP"

          aws s3 cp "$MZIP" "s3://${BUCKET}/${PREFIX}/quickstart-go-macos.zip"
          aws s3 cp "$WINZIP" "s3://${BUCKET}/${PREFIX}/quickstart-go-windows.zip"

          sha256sum "$MZIP" | awk '{print $1 "  quickstart-go-macos.zip"}' | aws s3 cp - "s3://${BUCKET}/${PREFIX}/quickstart-go-macos.zip.sha256" --content-type text/plain
          sha256sum "$WINZIP" | awk '{print $1 "  quickstart-go-windows.zip"}' | aws s3 cp - "s3://${BUCKET}/${PREFIX}/quickstart-go-windows.zip.sha256" --content-type text/plain

          SHA_M=$(sha256sum "$MZIP" | awk '{print $1}')
          SHA_WIN=$(sha256sum "$WINZIP" | awk '{print $1}')
          RELEASED="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          if ! aws s3 cp "s3://${BUCKET}/${CATALOG_KEY}" catalog.json 2>/dev/null; then
            echo '{"apps":{}}' > catalog.json
          fi

          NEW=$(jq -n \
            --arg released "$RELEASED" \
            --arg mat "$MATURITY" \
            --arg cat "$CATEGORY" \
            --arg iw "${{ env.S3_IFRAME_WIDTH }}" \
            --arg ih "${{ env.S3_IFRAME_HEIGHT }}" \
            --arg mac_zip "${BASE}/${PREFIX}/quickstart-go-macos.zip" \
            --arg sha_mac "$SHA_M" \
            --arg win_zip "${BASE}/${PREFIX}/quickstart-go-windows.zip" \
            --arg sha_win "$SHA_WIN" \
            '{
              maturity: $mat,
              category: $cat,
              released_at: $released,
              iframe: {width: ($iw | tonumber), height: ($ih | tonumber)},
              platforms: {
                macos: {zip_url: $mac_zip, sha256: $sha_mac},
                windows: {zip_url: $win_zip, sha256: $sha_win}
              }
            }')

          jq --arg game "$GAME" --arg ver "$VER" --argjson entry "$NEW" \
            --arg dn "${{ env.S3_DISPLAY_NAME }}" \
            --arg mat "$MATURITY" \
            --arg cat "$CATEGORY" \
            '.apps //= {}
            | .apps[$game] //= {display_name: $dn, maturity: $mat, category: $cat, versions: {}}
            | .apps[$game].versions //= {}
            | .apps[$game].versions[$ver] = $entry
            | .apps[$game].maturity = $mat | .apps[$game].category = $cat' catalog.json > catalog.merged.json

          aws s3 cp catalog.merged.json "s3://${BUCKET}/${CATALOG_KEY}" --content-type application/json
          echo "✅ Published quickstart to s3://${BUCKET}/${PREFIX}/ and updated ${CATALOG_KEY}"
