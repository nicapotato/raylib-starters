# Badge + manual dispatch for Windows x86_64 only (delegates to quickstart-c.yml).
name: quickstart-c Windows x86_64

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  run:
    uses: ./.github/workflows/quickstart-c.yml
    with:
      build_platform: windows-x86_64
    secrets: inherit
