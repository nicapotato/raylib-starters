name: Quickstart Lua CI/CD - itch.io

on:
  workflow_dispatch:
    inputs:
      build_platform:
        description: 'Platform to build'
        required: false
        default: 'all'
        type: choice
        options:
          - macos
          - windows
          - all
      env:
        description: 'Environment (dev or prod)'
        required: false
        default: 'prod'
        type: choice
        options:
          - dev
          - prod
      version:
        description: 'Version override (leave empty to use project.conf)'
        required: false
        default: ''
        type: string
      channel:
        description: 'itch.io channel name override (optional)'
        required: false
        default: ''
        type: string
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'quickstart-lua/**'

permissions:
  contents: read
  id-token: write

env:
  PROJECT_DIR: quickstart-lua
  ITCH_USER: nicapotato
  ITCH_GAME: quickstart-lua
  ENV: ${{ github.event.inputs.env || 'prod' }}
  AWS_REGION: eu-west-2
  S3_CATEGORY: apps
  S3_MATURITY: prototype
  S3_GAME_KEY: quickstart-lua
  S3_DISPLAY_NAME: 'Raylib quickstart (Lua prototype)'
  S3_IFRAME_WIDTH: '800'
  S3_IFRAME_HEIGHT: '600'
  PUBLISH_ITCH: 'true'
  PUBLISH_S3: 'true'

jobs:
  resolve-publish-flags:
    runs-on: ubuntu-latest
    outputs:
      publish_s3: ${{ steps.flags.outputs.publish_s3 }}
    steps:
      - id: flags
        run: echo "publish_s3=${PUBLISH_S3}" >> "$GITHUB_OUTPUT"

  build-and-push-macos:
    runs-on: macos-latest
    timeout-minutes: 45
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.build_platform == 'macos' ||
      github.event.inputs.build_platform == 'all'
    outputs:
      version: ${{ steps.setup.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies (Homebrew)
        run: |
          brew install raylib lua pkg-config

      - name: Setup deployment
        uses: ./.github/actions/build-go-project
        id: setup
        with:
          project_dir: ${{ env.PROJECT_DIR }}
          itch_user: ${{ env.ITCH_USER }}
          itch_game: ${{ env.ITCH_GAME }}
          build_platform: macos
          env: ${{ env.ENV }}
          channel: ${{ github.event.inputs.channel }}
          version_override: ${{ github.event.inputs.version }}
          butler_api_key: ${{ secrets.BUTLER_API_KEY }}
          deployment_only: 'true'
          publish_itch: ${{ env.PUBLISH_ITCH }}

      - name: Build macOS executable
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "🔨 Building macOS Lua host..."
          mkdir -p resources
          if [ -f "../resources/crystal_cave_track.mp3" ]; then
            cp ../resources/crystal_cave_track.mp3 resources/
          fi
          make
          echo "✅ Build complete"

      - name: Package macOS build
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "📦 Packaging macOS build..."
          ZIP_NAME="quickstart-lua-macos.zip"
          rm -f "${ZIP_NAME}"
          mkdir -p pkg
          cp raylib-quickstart-lua pkg/
          # Ship Homebrew dylibs next to the binary (itch users lack /opt/homebrew paths)
          python3 scripts/bundle-macos-dylibs.py pkg/raylib-quickstart-lua
          cp -r src pkg/
          cp -r resources pkg/
          cd pkg && zip -r "../${ZIP_NAME}" . && cd ..
          rm -rf pkg
          echo "✅ Package created: ${ZIP_NAME}"

      - name: Push to itch.io (macOS)
        uses: ./.github/actions/build-go-project
        with:
          project_dir: ${{ env.PROJECT_DIR }}
          itch_user: ${{ env.ITCH_USER }}
          itch_game: ${{ env.ITCH_GAME }}
          build_platform: macos
          env: ${{ env.ENV }}
          channel: ${{ github.event.inputs.channel }}
          version_override: ${{ steps.setup.outputs.version || github.event.inputs.version }}
          butler_api_key: ${{ secrets.BUTLER_API_KEY }}
          package_file: quickstart-lua-macos.zip
          deployment_only: 'true'
          publish_itch: ${{ env.PUBLISH_ITCH }}

      - name: Upload macOS zip artifact (S3 publish)
        if: env.PUBLISH_S3 == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-lua-macos-zip
          path: ${{ env.PROJECT_DIR }}/quickstart-lua-macos.zip
          if-no-files-found: error

  build-and-push-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.build_platform == 'windows' ||
      github.event.inputs.build_platform == 'all'
    outputs:
      version: ${{ steps.setup.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSYS2 and build dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-raylib
            mingw-w64-x86_64-lua

      - name: Setup deployment
        uses: ./.github/actions/build-go-project
        id: setup
        with:
          project_dir: ${{ env.PROJECT_DIR }}
          itch_user: ${{ env.ITCH_USER }}
          itch_game: ${{ env.ITCH_GAME }}
          build_platform: windows
          env: ${{ env.ENV }}
          channel: ${{ github.event.inputs.channel }}
          version_override: ${{ github.event.inputs.version }}
          butler_api_key: ${{ secrets.BUTLER_API_KEY }}
          deployment_only: 'true'
          publish_itch: ${{ env.PUBLISH_ITCH }}

      - name: Build Windows executable
        shell: msys2 {0}
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "🔨 Building Windows Lua host..."
          mkdir -p resources
          if [ -f "../resources/crystal_cave_track.mp3" ]; then
            cp ../resources/crystal_cave_track.mp3 resources/
          fi
          mingw32-make CC=gcc
          echo "✅ Build complete"
          ls -la
          test -f raylib-quickstart-lua.exe || test -f raylib-quickstart-lua

      - name: Package Windows build
        working-directory: ${{ env.PROJECT_DIR }}
        shell: pwsh
        run: |
          $ZIP_NAME = "quickstart-lua-windows.zip"
          $exe = if (Test-Path "raylib-quickstart-lua.exe") { "raylib-quickstart-lua.exe" } elseif (Test-Path "raylib-quickstart-lua") { "raylib-quickstart-lua" } else { throw "Lua host binary not found" }
          $staging = "pkg-win"
          Remove-Item -Recurse -Force $staging -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $staging | Out-Null
          Copy-Item $exe (Join-Path $staging (Split-Path $exe -Leaf))
          Copy-Item -Recurse "src" $staging
          Copy-Item -Recurse "resources" $staging
          Compress-Archive -Path "$staging\*" -DestinationPath $ZIP_NAME -Force
          Remove-Item -Recurse -Force $staging
          Write-Host "✅ Package created: $ZIP_NAME"

      - name: Push to itch.io (Windows)
        uses: ./.github/actions/build-go-project
        with:
          project_dir: ${{ env.PROJECT_DIR }}
          itch_user: ${{ env.ITCH_USER }}
          itch_game: ${{ env.ITCH_GAME }}
          build_platform: windows
          env: ${{ env.ENV }}
          channel: ${{ github.event.inputs.channel }}
          version_override: ${{ steps.setup.outputs.version || github.event.inputs.version }}
          butler_api_key: ${{ secrets.BUTLER_API_KEY }}
          package_file: quickstart-lua-windows.zip
          deployment_only: 'true'
          publish_itch: ${{ env.PUBLISH_ITCH }}

      - name: Upload Windows zip artifact (S3 publish)
        if: env.PUBLISH_S3 == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-lua-windows-zip
          path: ${{ env.PROJECT_DIR }}/quickstart-lua-windows.zip
          if-no-files-found: error

  publish-s3:
    runs-on: ubuntu-latest
    needs: [resolve-publish-flags, build-and-push-macos, build-and-push-windows]
    if: |
      needs.resolve-publish-flags.outputs.publish_s3 == 'true' &&
      github.event_name != 'workflow_dispatch' &&
      needs.build-and-push-macos.result == 'success' &&
      needs.build-and-push-windows.result == 'success'
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PUBLIC_SOFTWARE_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Upload zips, checksums, merge catalog
        env:
          BUCKET: ${{ secrets.S3_PUBLIC_SOFTWARE_BUCKET }}
          VERSION: ${{ needs.build-and-push-macos.outputs.version }}
          GAME_KEY: ${{ env.S3_GAME_KEY }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          set -euo pipefail
          BUCKET="${BUCKET:-prod-nicapotato-public-software}"
          GAME="${GAME_KEY}"
          VER="${VERSION}"
          REGION="${AWS_REGION}"
          BASE="https://${BUCKET}.s3.${REGION}.amazonaws.com"
          CATEGORY="${{ env.S3_CATEGORY }}"
          MATURITY="${{ env.S3_MATURITY }}"
          PREFIX="${CATEGORY}/${MATURITY}/${GAME}/${VER}"
          CATALOG_KEY="${CATEGORY}/${MATURITY}/catalog.json"

          MZIP="dist/quickstart-lua-macos-zip/quickstart-lua-macos.zip"
          WINZIP="dist/quickstart-lua-windows-zip/quickstart-lua-windows.zip"

          test -f "$MZIP" && test -f "$WINZIP"

          aws s3 cp "$MZIP" "s3://${BUCKET}/${PREFIX}/quickstart-lua-macos.zip"
          aws s3 cp "$WINZIP" "s3://${BUCKET}/${PREFIX}/quickstart-lua-windows.zip"

          sha256sum "$MZIP" | awk '{print $1 "  quickstart-lua-macos.zip"}' | aws s3 cp - "s3://${BUCKET}/${PREFIX}/quickstart-lua-macos.zip.sha256" --content-type text/plain
          sha256sum "$WINZIP" | awk '{print $1 "  quickstart-lua-windows.zip"}' | aws s3 cp - "s3://${BUCKET}/${PREFIX}/quickstart-lua-windows.zip.sha256" --content-type text/plain

          SHA_M=$(sha256sum "$MZIP" | awk '{print $1}')
          SHA_WIN=$(sha256sum "$WINZIP" | awk '{print $1}')
          RELEASED="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          if ! aws s3 cp "s3://${BUCKET}/${CATALOG_KEY}" catalog.json 2>/dev/null; then
            echo '{"apps":{}}' > catalog.json
          fi

          NEW=$(jq -n \
            --arg released "$RELEASED" \
            --arg mat "$MATURITY" \
            --arg cat "$CATEGORY" \
            --arg iw "${{ env.S3_IFRAME_WIDTH }}" \
            --arg ih "${{ env.S3_IFRAME_HEIGHT }}" \
            --arg mac_zip "${BASE}/${PREFIX}/quickstart-lua-macos.zip" \
            --arg sha_mac "$SHA_M" \
            --arg win_zip "${BASE}/${PREFIX}/quickstart-lua-windows.zip" \
            --arg sha_win "$SHA_WIN" \
            '{
              maturity: $mat,
              category: $cat,
              released_at: $released,
              iframe: {width: ($iw | tonumber), height: ($ih | tonumber)},
              platforms: {
                macos: {zip_url: $mac_zip, sha256: $sha_mac},
                windows: {zip_url: $win_zip, sha256: $sha_win}
              }
            }')

          jq --arg game "$GAME" --arg ver "$VER" --argjson entry "$NEW" \
            --arg dn "${{ env.S3_DISPLAY_NAME }}" \
            --arg mat "$MATURITY" \
            --arg cat "$CATEGORY" \
            '.apps //= {}
            | .apps[$game] //= {display_name: $dn, maturity: $mat, category: $cat, versions: {}}
            | .apps[$game].versions //= {}
            | .apps[$game].versions[$ver] = $entry
            | .apps[$game].maturity = $mat | .apps[$game].category = $cat' catalog.json > catalog.merged.json

          aws s3 cp catalog.merged.json "s3://${BUCKET}/${CATALOG_KEY}" --content-type application/json
          echo "✅ Published prototype to s3://${BUCKET}/${PREFIX}/ and updated ${CATALOG_KEY}"
