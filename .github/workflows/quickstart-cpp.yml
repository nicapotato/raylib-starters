name: Quickstart C++ CI/CD - itch.io

on:
  workflow_dispatch:
    inputs:
      build_platform:
        description: 'Platform to build'
        required: false
        default: 'all'
        type: choice
        options:
          - web
          - macos
          - windows
          - all
      channel:
        description: 'itch.io channel name (e.g., web, macos, osx)'
        required: false
        default: ''
        type: string
      version:
        description: 'Version override (leave empty to use project.conf)'
        required: false
        default: ''
        type: string
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'quickstart-cpp/**'

permissions:
  contents: read
  id-token: write

env:
  PROJECT_DIR: quickstart-cpp
  ITCH_USER: nicapotato
  ITCH_GAME: quickstart-cpp
  AWS_REGION: eu-west-2
  S3_CATEGORY: apps
  S3_MATURITY: quickstart
  S3_GAME_KEY: quickstart-cpp
  S3_DISPLAY_NAME: 'Raylib quickstart (C++)'
  S3_IFRAME_WIDTH: '800'
  S3_IFRAME_HEIGHT: '600'
  PUBLISH_ITCH: 'true'
  PUBLISH_S3: 'true'

jobs:
  resolve-publish-flags:
    runs-on: ubuntu-latest
    outputs:
      publish_s3: ${{ steps.flags.outputs.publish_s3 }}
    steps:
      - id: flags
        run: echo "publish_s3=${PUBLISH_S3}" >> "$GITHUB_OUTPUT"

  build-and-push-web:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.build_platform == 'web' ||
      github.event.inputs.build_platform == 'all'
    outputs:
      version: ${{ steps.web_build.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'

      - name: Build and deploy web
        id: web_build
        uses: ./.github/actions/build-c-project
        with:
          project_dir: ${{ env.PROJECT_DIR }}
          itch_user: ${{ env.ITCH_USER }}
          itch_game: ${{ env.ITCH_GAME }}
          build_platform: web
          channel: ${{ github.event.inputs.channel || 'web' }}
          version_override: ${{ github.event.inputs.version }}
          butler_api_key: ${{ secrets.BUTLER_API_KEY }}
          publish_itch: ${{ env.PUBLISH_ITCH }}

      - name: Upload WASM zip artifact (S3 publish)
        if: env.PUBLISH_S3 == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-cpp-wasm-zip
          path: ${{ env.PROJECT_DIR }}/bin/wasm/raylib-quickstart-cpp_wasm.zip
          if-no-files-found: error

      - name: Upload WASM exploded artifact (S3 publish)
        if: env.PUBLISH_S3 == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-cpp-wasm-exploded
          path: ${{ env.PROJECT_DIR }}/bin/wasm/
          if-no-files-found: error

  build-and-push-macos:
    runs-on: macos-latest
    timeout-minutes: 45
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.build_platform == 'macos' ||
      github.event.inputs.build_platform == 'all'
    outputs:
      version: ${{ steps.setup.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup and build project
        uses: ./.github/actions/build-c-project
        id: setup
        with:
          project_dir: ${{ env.PROJECT_DIR }}
          itch_user: ${{ env.ITCH_USER }}
          itch_game: ${{ env.ITCH_GAME }}
          build_platform: macos
          channel: ${{ github.event.inputs.channel || 'osx' }}
          version_override: ${{ github.event.inputs.version }}
          butler_api_key: ${{ secrets.BUTLER_API_KEY }}
          skip_project_build: 'true'
          publish_itch: ${{ env.PUBLISH_ITCH }}

      - name: Build macOS executable
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "🔨 Building macOS executable (clang++, arm64; raylib from setup step)..."
          mkdir -p bin/Release resources
          if [ -f "../resources/crystal_cave_track.mp3" ]; then
            cp ../resources/crystal_cave_track.mp3 resources/
          fi
          clang++ src/main.cpp \
            -o bin/Release/raylib-quickstart-cpp \
            -O2 -std=c++17 \
            -I include -I raylib/src -I raylib/src/external \
            -L raylib/src -lraylib \
            -framework Cocoa -framework IOKit -framework OpenGL \
            -framework CoreAudio -framework CoreVideo \
            -framework CoreFoundation -framework AudioToolbox \
            -arch arm64
          if [ -d "resources" ]; then
            cp -r resources bin/Release/
          fi
          echo "✅ macOS executable build complete"

      - name: Package macOS build
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "📦 Packaging macOS build..."
          ZIP_NAME="raylib-quickstart-cpp-macos.zip"
          rm -f "${ZIP_NAME}"

          if [ -d "bin/Release" ]; then
            cd bin/Release
            zip -r "../../${ZIP_NAME}" .
            cd ../..
          elif [ -d "bin/Debug" ]; then
            cd bin/Debug
            zip -r "../../${ZIP_NAME}" .
            cd ../..
          else
            echo "❌ Error: No build output directory found"
            exit 1
          fi

          echo "✅ Package created: ${ZIP_NAME}"

      - name: Push to itch.io (macOS)
        uses: ./.github/actions/build-c-project
        with:
          project_dir: ${{ env.PROJECT_DIR }}
          itch_user: ${{ env.ITCH_USER }}
          itch_game: ${{ env.ITCH_GAME }}
          build_platform: macos
          channel: ${{ github.event.inputs.channel || 'osx' }}
          version_override: ${{ steps.setup.outputs.version || github.event.inputs.version }}
          butler_api_key: ${{ secrets.BUTLER_API_KEY }}
          package_file: raylib-quickstart-cpp-macos.zip
          package_source_dir: bin/Release
          deployment_only: 'true'
          publish_itch: ${{ env.PUBLISH_ITCH }}

      - name: Upload macOS zip artifact (S3 publish)
        if: env.PUBLISH_S3 == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-cpp-macos-zip
          path: ${{ env.PROJECT_DIR }}/raylib-quickstart-cpp-macos.zip
          if-no-files-found: error

  build-and-push-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.build_platform == 'windows' ||
      github.event.inputs.build_platform == 'all'
    outputs:
      version: ${{ steps.setup.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install MinGW
        run: |
          echo "📦 Installing MinGW..."
          choco install mingw -y
          $env:PATH += ";C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin"
          echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "✅ MinGW installed"

      - name: Setup Raylib
        uses: ./.github/actions/build-c-project
        id: setup
        with:
          project_dir: ${{ env.PROJECT_DIR }}
          itch_user: ${{ env.ITCH_USER }}
          itch_game: ${{ env.ITCH_GAME }}
          build_platform: windows
          channel: ${{ github.event.inputs.channel || 'windows' }}
          version_override: ${{ github.event.inputs.version }}
          butler_api_key: ${{ secrets.BUTLER_API_KEY }}
          skip_project_build: 'true'
          publish_itch: ${{ env.PUBLISH_ITCH }}

      - name: Build Windows executable
        working-directory: ${{ env.PROJECT_DIR }}
        shell: bash
        run: |
          echo "🔨 Building Windows executable..."

          mkdir -p release obj

          windres src/application.rc -o obj/resources.o -I src || echo "Warning: Resource compilation failed"

          OBJ_FILES=""
          if [ -f "obj/resources.o" ]; then
            OBJ_FILES="obj/resources.o"
          fi

          if [ -n "$OBJ_FILES" ]; then
            g++ src/main.cpp $OBJ_FILES -o release/raylib-quickstart-cpp.exe -O2 -std=c++17 -I include -I raylib/src -I raylib/src/external -L raylib/src -lraylib -lgdi32 -lwinmm -static
          else
            g++ src/main.cpp -o release/raylib-quickstart-cpp.exe -O2 -std=c++17 -I include -I raylib/src -I raylib/src/external -L raylib/src -lraylib -lgdi32 -lwinmm -static
          fi

          if [ -d "resources" ]; then
            cp -r resources release/resources || true
          fi
          if [ -f "../resources/crystal_cave_track.mp3" ]; then
            mkdir -p release/resources
            cp ../resources/crystal_cave_track.mp3 release/resources/ || true
          fi

          echo "✅ Windows build complete"

      - name: Package Windows build
        working-directory: ${{ env.PROJECT_DIR }}
        shell: pwsh
        run: |
          echo "📦 Packaging Windows build..."
          $ZIP_NAME = "raylib-quickstart-cpp-windows.zip"

          if (Test-Path "release") {
            $SOURCE_DIR = "release"
          } elseif (Test-Path "bin\Release") {
            $SOURCE_DIR = "bin\Release"
          } elseif (Test-Path "bin\Debug") {
            $SOURCE_DIR = "bin\Debug"
          } else {
            Write-Host "❌ Error: No build output directory found"
            exit 1
          }

          Compress-Archive -Path "${SOURCE_DIR}\*" -DestinationPath $ZIP_NAME -Force
          echo "✅ Package created: $ZIP_NAME"

      - name: Push to itch.io (Windows)
        uses: ./.github/actions/build-c-project
        with:
          project_dir: ${{ env.PROJECT_DIR }}
          itch_user: ${{ env.ITCH_USER }}
          itch_game: ${{ env.ITCH_GAME }}
          build_platform: windows
          channel: ${{ github.event.inputs.channel || 'windows' }}
          version_override: ${{ steps.setup.outputs.version || github.event.inputs.version }}
          butler_api_key: ${{ secrets.BUTLER_API_KEY }}
          package_file: raylib-quickstart-cpp-windows.zip
          package_source_dir: release
          deployment_only: 'true'
          publish_itch: ${{ env.PUBLISH_ITCH }}

      - name: Upload Windows zip artifact (S3 publish)
        if: env.PUBLISH_S3 == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-cpp-windows-zip
          path: ${{ env.PROJECT_DIR }}/raylib-quickstart-cpp-windows.zip
          if-no-files-found: error

  publish-s3:
    runs-on: ubuntu-latest
    needs: [resolve-publish-flags, build-and-push-web, build-and-push-macos, build-and-push-windows]
    if: |
      needs.resolve-publish-flags.outputs.publish_s3 == 'true' &&
      github.event_name != 'workflow_dispatch' &&
      needs.build-and-push-web.result == 'success' &&
      needs.build-and-push-macos.result == 'success' &&
      needs.build-and-push-windows.result == 'success'
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PUBLIC_SOFTWARE_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Upload zips, WASM tree, checksums, merge catalog
        env:
          BUCKET: ${{ secrets.S3_PUBLIC_SOFTWARE_BUCKET }}
          VERSION: ${{ needs.build-and-push-web.outputs.version }}
          GAME_KEY: ${{ env.S3_GAME_KEY }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          set -euo pipefail
          BUCKET="${BUCKET:-prod-nicapotato-public-software}"
          GAME="${GAME_KEY}"
          VER="${VERSION}"
          REGION="${AWS_REGION}"
          BASE="https://${BUCKET}.s3.${REGION}.amazonaws.com"
          CATEGORY="${{ env.S3_CATEGORY }}"
          MATURITY="${{ env.S3_MATURITY }}"
          PREFIX="${CATEGORY}/${MATURITY}/${GAME}/${VER}"
          CATALOG_KEY="${CATEGORY}/${MATURITY}/catalog.json"

          WZIP="dist/quickstart-cpp-wasm-zip/raylib-quickstart-cpp_wasm.zip"
          MZIP="dist/quickstart-cpp-macos-zip/raylib-quickstart-cpp-macos.zip"
          WINZIP="dist/quickstart-cpp-windows-zip/raylib-quickstart-cpp-windows.zip"
          WDIR="dist/quickstart-cpp-wasm-exploded"

          test -f "$WZIP" && test -f "$MZIP" && test -f "$WINZIP" && test -d "$WDIR"

          aws s3 cp "$WZIP" "s3://${BUCKET}/${PREFIX}/quickstart-cpp-wasm.zip"
          aws s3 cp "$MZIP" "s3://${BUCKET}/${PREFIX}/quickstart-cpp-macos.zip"
          aws s3 cp "$WINZIP" "s3://${BUCKET}/${PREFIX}/quickstart-cpp-windows.zip"

          sha256sum "$WZIP" | awk '{print $1 "  quickstart-cpp-wasm.zip"}' | aws s3 cp - "s3://${BUCKET}/${PREFIX}/quickstart-cpp-wasm.zip.sha256" --content-type text/plain
          sha256sum "$MZIP" | awk '{print $1 "  quickstart-cpp-macos.zip"}' | aws s3 cp - "s3://${BUCKET}/${PREFIX}/quickstart-cpp-macos.zip.sha256" --content-type text/plain
          sha256sum "$WINZIP" | awk '{print $1 "  quickstart-cpp-windows.zip"}' | aws s3 cp - "s3://${BUCKET}/${PREFIX}/quickstart-cpp-windows.zip.sha256" --content-type text/plain

          cd "$WDIR"
          find . -type f | while IFS= read -r f; do
            rel="${f#./}"
            case "$rel" in
              *.html) ct=text/html ;;
              *.js)   ct=application/javascript ;;
              *.wasm) ct=application/wasm ;;
              *.data) ct=application/octet-stream ;;
              *.png)  ct=image/png ;;
              *.jpg|*.jpeg) ct=image/jpeg ;;
              *.json) ct=application/json ;;
              *)      ct=application/octet-stream ;;
            esac
            aws s3 cp "$f" "s3://${BUCKET}/${PREFIX}/wasm/${rel}" --content-type "$ct"
          done
          cd - >/dev/null

          SHA_W=$(sha256sum "$WZIP" | awk '{print $1}')
          SHA_M=$(sha256sum "$MZIP" | awk '{print $1}')
          SHA_WIN=$(sha256sum "$WINZIP" | awk '{print $1}')
          RELEASED="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          if ! aws s3 cp "s3://${BUCKET}/${CATALOG_KEY}" catalog.json 2>/dev/null; then
            echo '{"apps":{}}' > catalog.json
          fi

          NEW=$(jq -n \
            --arg released "$RELEASED" \
            --arg mat "$MATURITY" \
            --arg cat "$CATEGORY" \
            --arg iw "${{ env.S3_IFRAME_WIDTH }}" \
            --arg ih "${{ env.S3_IFRAME_HEIGHT }}" \
            --arg wasm_zip "${BASE}/${PREFIX}/quickstart-cpp-wasm.zip" \
            --arg sha_wasm "$SHA_W" \
            --arg mac_zip "${BASE}/${PREFIX}/quickstart-cpp-macos.zip" \
            --arg sha_mac "$SHA_M" \
            --arg win_zip "${BASE}/${PREFIX}/quickstart-cpp-windows.zip" \
            --arg sha_win "$SHA_WIN" \
            --arg play_wasm "${BASE}/${PREFIX}/wasm/index.html" \
            '{
              maturity: $mat,
              category: $cat,
              released_at: $released,
              iframe: {width: ($iw | tonumber), height: ($ih | tonumber)},
              platforms: {
                wasm: {zip_url: $wasm_zip, sha256: $sha_wasm, play_url: $play_wasm},
                macos: {zip_url: $mac_zip, sha256: $sha_mac},
                windows: {zip_url: $win_zip, sha256: $sha_win}
              }
            }')

          jq --arg game "$GAME" --arg ver "$VER" --argjson entry "$NEW" \
            --arg dn "${{ env.S3_DISPLAY_NAME }}" \
            --arg mat "$MATURITY" \
            --arg cat "$CATEGORY" \
            '.apps //= {}
            | .apps[$game] //= {display_name: $dn, maturity: $mat, category: $cat, versions: {}}
            | .apps[$game].versions //= {}
            | .apps[$game].versions[$ver] = $entry
            | .apps[$game].maturity = $mat | .apps[$game].category = $cat' catalog.json > catalog.merged.json

          aws s3 cp catalog.merged.json "s3://${BUCKET}/${CATALOG_KEY}" --content-type application/json
          echo "✅ Published quickstart to s3://${BUCKET}/${PREFIX}/ and updated ${CATALOG_KEY}"
