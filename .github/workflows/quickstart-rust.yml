name: Quickstart Rust CI/CD - itch.io

on:
  workflow_dispatch:
    inputs:
      build_platform:
        description: 'Platform to build'
        required: false
        default: 'all'
        type: choice
        options:
          - web
          - macos
          - windows
          - all
      env:
        description: 'Environment (dev or prod)'
        required: false
        default: 'prod'
        type: choice
        options:
          - dev
          - prod
      version:
        description: 'Version override (leave empty to use project.conf)'
        required: false
        default: ''
        type: string
      channel:
        description: 'itch.io channel name override (optional)'
        required: false
        default: ''
        type: string
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'quickstart-rust/**'

permissions:
  contents: read
  id-token: write

env:
  PROJECT_DIR: quickstart-rust
  ITCH_USER: nicapotato
  ITCH_GAME: quickstart-rust
  ENV: ${{ github.event.inputs.env || 'prod' }}
  APP_NAME: raylib-quickstart-rust
  # Crate name with underscores (used for .wasm and .data files)
  CRATE_NAME_UNDER: raylib_quickstart_rust
  AWS_REGION: eu-west-2
  S3_CATEGORY: games
  S3_MATURITY: prototype
  S3_GAME_KEY: quickstart-rust
  S3_DISPLAY_NAME: 'Raylib quickstart (Rust prototype)'
  S3_IFRAME_WIDTH: '800'
  S3_IFRAME_HEIGHT: '600'
  PUBLISH_ITCH: 'false'
  PUBLISH_S3: 'true'

jobs:
  resolve-publish-flags:
    runs-on: ubuntu-latest
    outputs:
      publish_s3: ${{ steps.flags.outputs.publish_s3 }}
    steps:
      - id: flags
        run: echo "publish_s3=${PUBLISH_S3}" >> "$GITHUB_OUTPUT"

  build-and-push-web:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.build_platform == 'web' ||
      github.event.inputs.build_platform == 'all'
    outputs:
      version: ${{ steps.setup.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'

      - name: Install system dependencies
        run: |
          echo "📦 Installing system dependencies..."
          sudo apt-get update
          sudo apt-get install -y cmake libclang-dev
          echo "✅ System dependencies installed"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-emscripten

      - name: Copy shared resources
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "📦 Copying shared resources..."
          mkdir -p resources
          if [ -f "../resources/crystal_cave_track.mp3" ]; then
            cp ../resources/crystal_cave_track.mp3 resources/
            echo "✅ Copied crystal_cave_track.mp3"
          else
            echo "⚠️  Shared resource crystal_cave_track.mp3 not found, skipping"
          fi

      - name: Ensure .cargo/config.toml exists
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          # The .cargo/config.toml provides EMCC_CFLAGS and rustflags for WASM builds
          if [ ! -f ".cargo/config.toml" ]; then
            echo "⚠️  .cargo/config.toml not found, creating..."
            mkdir -p .cargo
            cat > .cargo/config.toml << 'TOML'
          [env]
          EMCC_CFLAGS = "-O2 -sUSE_GLFW=3 -sASSERTIONS=1 -sWASM=1 -sGL_ENABLE_GET_PROC_ADDRESS=1"

          [target.wasm32-unknown-emscripten]
          rustflags = [
              "-C", "link-args=-sUSE_GLFW=3 -sFORCE_FILESYSTEM=1 -sALLOW_MEMORY_GROWTH=1 -sGL_ENABLE_GET_PROC_ADDRESS=1 -sSTACK_SIZE=2097152 -sEXPORTED_RUNTIME_METHODS=ccall,cwrap,HEAPF32 --preload-file resources@resources"
          ]
          TOML
            echo "✅ Created .cargo/config.toml"
          else
            echo "✅ .cargo/config.toml already exists"
          fi

      - name: Setup deployment
        uses: ./.github/actions/build-rust-project
        id: setup
        with:
          project_dir: ${{ env.PROJECT_DIR }}
          itch_user: ${{ env.ITCH_USER }}
          itch_game: ${{ env.ITCH_GAME }}
          build_platform: web
          env: ${{ env.ENV }}
          channel: ${{ github.event.inputs.channel }}
          version_override: ${{ github.event.inputs.version }}
          butler_api_key: ${{ secrets.BUTLER_API_KEY }}
          deployment_only: 'true'
          publish_itch: ${{ env.PUBLISH_ITCH }}

      - name: Build WebAssembly version
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "🔨 Building WebAssembly version..."
          cargo build --target=wasm32-unknown-emscripten --release
          echo "✅ WebAssembly build complete"

      - name: Package web build
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "📦 Packaging web build..."
          ZIP_NAME="quickstart-rust-web.zip"
          WASM_BUILD_DIR="target/wasm32-unknown-emscripten/release"

          # Assemble web distribution directory
          mkdir -p web-dist

          # Copy index.html from web/ directory
          if [ -f "web/index.html" ]; then
            cp web/index.html web-dist/
          else
            echo "❌ Error: web/index.html not found"
            exit 1
          fi

          # Copy WASM artifacts (JS uses hyphens, WASM/data use underscores)
          cp "${WASM_BUILD_DIR}/${APP_NAME}.js" web-dist/
          cp "${WASM_BUILD_DIR}/${CRATE_NAME_UNDER}.wasm" web-dist/
          # Data file may be in deps/ subdirectory
          if [ -f "${WASM_BUILD_DIR}/deps/${CRATE_NAME_UNDER}.data" ]; then
            cp "${WASM_BUILD_DIR}/deps/${CRATE_NAME_UNDER}.data" web-dist/
          elif [ -f "${WASM_BUILD_DIR}/${CRATE_NAME_UNDER}.data" ]; then
            cp "${WASM_BUILD_DIR}/${CRATE_NAME_UNDER}.data" web-dist/
          else
            echo "⚠️  Data file not found, continuing without it"
          fi

          echo "📋 Web distribution contents:"
          ls -lh web-dist/

          # Create zip
          cd web-dist
          zip -r "../${ZIP_NAME}" .
          cd ..

          echo "✅ Package created: ${ZIP_NAME}"

      - name: Push to itch.io (web)
        uses: ./.github/actions/build-rust-project
        with:
          project_dir: ${{ env.PROJECT_DIR }}
          itch_user: ${{ env.ITCH_USER }}
          itch_game: ${{ env.ITCH_GAME }}
          build_platform: web
          env: ${{ env.ENV }}
          channel: ${{ github.event.inputs.channel }}
          version_override: ${{ steps.setup.outputs.version || github.event.inputs.version }}
          butler_api_key: ${{ secrets.BUTLER_API_KEY }}
          package_file: quickstart-rust-web.zip
          deployment_only: 'true'
          publish_itch: ${{ env.PUBLISH_ITCH }}

      - name: Upload WASM zip artifact (S3 publish)
        if: env.PUBLISH_S3 == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-rust-wasm-zip
          path: ${{ env.PROJECT_DIR }}/quickstart-rust-web.zip
          if-no-files-found: error

      - name: Upload WASM exploded artifact (S3 publish)
        if: env.PUBLISH_S3 == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-rust-wasm-exploded
          path: ${{ env.PROJECT_DIR }}/web-dist/
          if-no-files-found: error

  build-and-push-macos:
    runs-on: macos-latest
    timeout-minutes: 45
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.build_platform == 'macos' ||
      github.event.inputs.build_platform == 'all'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Copy shared resources
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "📦 Copying shared resources..."
          mkdir -p resources
          if [ -f "../resources/crystal_cave_track.mp3" ]; then
            cp ../resources/crystal_cave_track.mp3 resources/
            echo "✅ Copied crystal_cave_track.mp3"
          else
            echo "⚠️  Shared resource crystal_cave_track.mp3 not found, skipping"
          fi

      - name: Setup deployment
        uses: ./.github/actions/build-rust-project
        id: setup
        with:
          project_dir: ${{ env.PROJECT_DIR }}
          itch_user: ${{ env.ITCH_USER }}
          itch_game: ${{ env.ITCH_GAME }}
          build_platform: macos
          env: ${{ env.ENV }}
          channel: ${{ github.event.inputs.channel }}
          version_override: ${{ github.event.inputs.version }}
          butler_api_key: ${{ secrets.BUTLER_API_KEY }}
          deployment_only: 'true'
          publish_itch: ${{ env.PUBLISH_ITCH }}

      - name: Build macOS executable
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "🔨 Building macOS executable..."
          cargo build --release

          # Copy resources next to binary
          mkdir -p target/release/resources
          cp -r resources/* target/release/resources/

          # Ad-hoc codesign for Apple Silicon distribution
          # The linker-signed signature gets invalidated during zip/upload/download,
          # causing macOS kernel to SIGKILL the binary. A proper ad-hoc signature survives.
          codesign -s - -f target/release/${APP_NAME}
          codesign --verify target/release/${APP_NAME}
          echo "✅ Binary signed and verified"

          echo "✅ macOS executable build complete"

      - name: Package macOS build
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "📦 Packaging macOS build..."
          ZIP_NAME="quickstart-rust-macos.zip"
          rm -f "${ZIP_NAME}"

          # Create a clean staging directory with binary + resources
          mkdir -p staging
          cp target/release/${APP_NAME} staging/
          if [ -d "target/release/resources" ]; then
            cp -r target/release/resources staging/
          fi

          cd staging
          zip -r "../${ZIP_NAME}" .
          cd ..
          rm -rf staging

          echo "✅ Package created: ${ZIP_NAME}"

      - name: Push to itch.io (macOS)
        uses: ./.github/actions/build-rust-project
        with:
          project_dir: ${{ env.PROJECT_DIR }}
          itch_user: ${{ env.ITCH_USER }}
          itch_game: ${{ env.ITCH_GAME }}
          build_platform: macos
          env: ${{ env.ENV }}
          channel: ${{ github.event.inputs.channel }}
          version_override: ${{ steps.setup.outputs.version || github.event.inputs.version }}
          butler_api_key: ${{ secrets.BUTLER_API_KEY }}
          package_file: quickstart-rust-macos.zip
          deployment_only: 'true'
          publish_itch: ${{ env.PUBLISH_ITCH }}

      - name: Upload macOS zip artifact (S3 publish)
        if: env.PUBLISH_S3 == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-rust-macos-zip
          path: ${{ env.PROJECT_DIR }}/quickstart-rust-macos.zip
          if-no-files-found: error

  build-and-push-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.build_platform == 'windows' ||
      github.event.inputs.build_platform == 'all'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install LLVM
        run: |
          echo "📦 Installing LLVM for bindgen..."
          choco install llvm -y
          echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\lib" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "✅ LLVM installed"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Copy shared resources
        working-directory: ${{ env.PROJECT_DIR }}
        shell: bash
        run: |
          echo "📦 Copying shared resources..."
          mkdir -p resources
          if [ -f "../resources/crystal_cave_track.mp3" ]; then
            cp ../resources/crystal_cave_track.mp3 resources/
            echo "✅ Copied crystal_cave_track.mp3"
          else
            echo "⚠️  Shared resource crystal_cave_track.mp3 not found, skipping"
          fi

      - name: Setup deployment
        uses: ./.github/actions/build-rust-project
        id: setup
        with:
          project_dir: ${{ env.PROJECT_DIR }}
          itch_user: ${{ env.ITCH_USER }}
          itch_game: ${{ env.ITCH_GAME }}
          build_platform: windows
          env: ${{ env.ENV }}
          channel: ${{ github.event.inputs.channel }}
          version_override: ${{ github.event.inputs.version }}
          butler_api_key: ${{ secrets.BUTLER_API_KEY }}
          deployment_only: 'true'
          publish_itch: ${{ env.PUBLISH_ITCH }}

      - name: Build Windows executable
        working-directory: ${{ env.PROJECT_DIR }}
        shell: bash
        run: |
          echo "🔨 Building Windows executable..."
          cargo build --release

          # Copy resources next to binary
          mkdir -p target/release/resources
          cp -r resources/* target/release/resources/

          echo "✅ Windows executable build complete"

      - name: Package Windows build
        working-directory: ${{ env.PROJECT_DIR }}
        shell: pwsh
        run: |
          echo "📦 Packaging Windows build..."
          $ZIP_NAME = "quickstart-rust-windows.zip"
          $APP = "$env:APP_NAME"

          # Create staging directory with binary + resources
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          Copy-Item "target\release\${APP}.exe" staging\
          if (Test-Path "target\release\resources") {
            Copy-Item -Recurse "target\release\resources" staging\
          }

          Compress-Archive -Path "staging\*" -DestinationPath $ZIP_NAME -Force
          Remove-Item -Recurse -Force staging

          echo "✅ Package created: $ZIP_NAME"

      - name: Push to itch.io (Windows)
        uses: ./.github/actions/build-rust-project
        with:
          project_dir: ${{ env.PROJECT_DIR }}
          itch_user: ${{ env.ITCH_USER }}
          itch_game: ${{ env.ITCH_GAME }}
          build_platform: windows
          env: ${{ env.ENV }}
          channel: ${{ github.event.inputs.channel }}
          version_override: ${{ steps.setup.outputs.version || github.event.inputs.version }}
          butler_api_key: ${{ secrets.BUTLER_API_KEY }}
          package_file: quickstart-rust-windows.zip
          deployment_only: 'true'
          publish_itch: ${{ env.PUBLISH_ITCH }}

      - name: Upload Windows zip artifact (S3 publish)
        if: env.PUBLISH_S3 == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-rust-windows-zip
          path: ${{ env.PROJECT_DIR }}/quickstart-rust-windows.zip
          if-no-files-found: error

  publish-s3:
    runs-on: ubuntu-latest
    needs: [resolve-publish-flags, build-and-push-web, build-and-push-macos, build-and-push-windows]
    if: |
      needs.resolve-publish-flags.outputs.publish_s3 == 'true' &&
      github.event_name != 'pull_request' &&
      needs.build-and-push-web.result == 'success' &&
      needs.build-and-push-macos.result == 'success' &&
      needs.build-and-push-windows.result == 'success'
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PUBLIC_SOFTWARE_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Upload zips, WASM tree, checksums, merge catalog
        env:
          BUCKET: ${{ secrets.S3_PUBLIC_SOFTWARE_BUCKET }}
          VERSION: ${{ needs.build-and-push-web.outputs.version }}
          GAME_KEY: ${{ env.S3_GAME_KEY }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          set -euo pipefail
          BUCKET="${BUCKET:-prod-nicapotato-public-software}"
          GAME="${GAME_KEY}"
          VER="${VERSION}"
          REGION="${AWS_REGION}"
          BASE="https://${BUCKET}.s3.${REGION}.amazonaws.com"
          CATEGORY="${{ env.S3_CATEGORY }}"
          MATURITY="${{ env.S3_MATURITY }}"
          PREFIX="${CATEGORY}/${MATURITY}/${GAME}/${VER}"
          CATALOG_KEY="${CATEGORY}/${MATURITY}/catalog.json"

          WZIP="dist/quickstart-rust-wasm-zip/quickstart-rust-web.zip"
          MZIP="dist/quickstart-rust-macos-zip/quickstart-rust-macos.zip"
          WINZIP="dist/quickstart-rust-windows-zip/quickstart-rust-windows.zip"
          WDIR="dist/quickstart-rust-wasm-exploded"

          test -f "$WZIP" && test -f "$MZIP" && test -f "$WINZIP" && test -d "$WDIR"

          aws s3 cp "$WZIP" "s3://${BUCKET}/${PREFIX}/quickstart-rust-wasm.zip"
          aws s3 cp "$MZIP" "s3://${BUCKET}/${PREFIX}/quickstart-rust-macos.zip"
          aws s3 cp "$WINZIP" "s3://${BUCKET}/${PREFIX}/quickstart-rust-windows.zip"

          sha256sum "$WZIP" | awk '{print $1 "  quickstart-rust-wasm.zip"}' | aws s3 cp - "s3://${BUCKET}/${PREFIX}/quickstart-rust-wasm.zip.sha256" --content-type text/plain
          sha256sum "$MZIP" | awk '{print $1 "  quickstart-rust-macos.zip"}' | aws s3 cp - "s3://${BUCKET}/${PREFIX}/quickstart-rust-macos.zip.sha256" --content-type text/plain
          sha256sum "$WINZIP" | awk '{print $1 "  quickstart-rust-windows.zip"}' | aws s3 cp - "s3://${BUCKET}/${PREFIX}/quickstart-rust-windows.zip.sha256" --content-type text/plain

          cd "$WDIR"
          find . -type f | while IFS= read -r f; do
            rel="${f#./}"
            case "$rel" in
              *.html) ct=text/html ;;
              *.js)   ct=application/javascript ;;
              *.wasm) ct=application/wasm ;;
              *.data) ct=application/octet-stream ;;
              *.png)  ct=image/png ;;
              *.jpg|*.jpeg) ct=image/jpeg ;;
              *.json) ct=application/json ;;
              *)      ct=application/octet-stream ;;
            esac
            aws s3 cp "$f" "s3://${BUCKET}/${PREFIX}/wasm/${rel}" --content-type "$ct"
          done
          cd - >/dev/null

          SHA_W=$(sha256sum "$WZIP" | awk '{print $1}')
          SHA_M=$(sha256sum "$MZIP" | awk '{print $1}')
          SHA_WIN=$(sha256sum "$WINZIP" | awk '{print $1}')
          RELEASED="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          if ! aws s3 cp "s3://${BUCKET}/${CATALOG_KEY}" catalog.json 2>/dev/null; then
            echo '{"games":{}}' > catalog.json
          fi

          NEW=$(jq -n \
            --arg released "$RELEASED" \
            --arg iw "${{ env.S3_IFRAME_WIDTH }}" \
            --arg ih "${{ env.S3_IFRAME_HEIGHT }}" \
            --arg wasm_zip "${BASE}/${PREFIX}/quickstart-rust-wasm.zip" \
            --arg sha_wasm "$SHA_W" \
            --arg mac_zip "${BASE}/${PREFIX}/quickstart-rust-macos.zip" \
            --arg sha_mac "$SHA_M" \
            --arg win_zip "${BASE}/${PREFIX}/quickstart-rust-windows.zip" \
            --arg sha_win "$SHA_WIN" \
            --arg play_wasm "${BASE}/${PREFIX}/wasm/index.html" \
            '{
              released_at: $released,
              iframe: {width: ($iw | tonumber), height: ($ih | tonumber)},
              platforms: {
                wasm: {zip_url: $wasm_zip, sha256: $sha_wasm, play_url: $play_wasm},
                macos: {zip_url: $mac_zip, sha256: $sha_mac},
                windows: {zip_url: $win_zip, sha256: $sha_win}
              }
            }')

          jq --arg game "$GAME" --arg ver "$VER" --argjson entry "$NEW" \
            --arg dn "${{ env.S3_DISPLAY_NAME }}" \
            '.games //= {}
            | .games[$game] //= {display_name: $dn, versions: {}}
            | .games[$game].versions //= {}
            | .games[$game].versions[$ver] = $entry' catalog.json > catalog.merged.json

          aws s3 cp catalog.merged.json "s3://${BUCKET}/${CATALOG_KEY}" --content-type application/json
          echo "✅ Published prototype to s3://${BUCKET}/${PREFIX}/ and updated ${CATALOG_KEY}"
