name: Quickstart Zig CI/CD - itch.io

on:
  workflow_dispatch:
    inputs:
      build_platform:
        description: 'Platform to build'
        required: false
        default: 'all'
        type: choice
        options:
          - web
          - macos
          - windows
          - all
      env:
        description: 'Environment (dev or prod)'
        required: false
        default: 'prod'
        type: choice
        options:
          - dev
          - prod
      version:
        description: 'Version override (leave empty to use project.conf)'
        required: false
        default: ''
        type: string
      channel:
        description: 'itch.io channel name override (optional)'
        required: false
        default: ''
        type: string
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'quickstart-zig/**'

permissions:
  contents: read
  id-token: write

env:
  PROJECT_DIR: quickstart-zig
  ITCH_USER: nicapotato
  ITCH_GAME: quickstart-zig
  ENV: ${{ github.event.inputs.env || 'prod' }}
  AWS_REGION: eu-west-2
  S3_CATEGORY: games
  S3_MATURITY: prototype
  S3_GAME_KEY: quickstart-zig
  S3_DISPLAY_NAME: 'Raylib quickstart (Zig prototype)'
  S3_IFRAME_WIDTH: '800'
  S3_IFRAME_HEIGHT: '600'
  PUBLISH_ITCH: 'false'
  PUBLISH_S3: 'true'

jobs:
  resolve-publish-flags:
    runs-on: ubuntu-latest
    outputs:
      publish_s3: ${{ steps.flags.outputs.publish_s3 }}
    steps:
      - id: flags
        run: echo "publish_s3=${PUBLISH_S3}" >> "$GITHUB_OUTPUT"

  build-and-push-web:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.build_platform == 'web' ||
      github.event.inputs.build_platform == 'all'
    outputs:
      version: ${{ steps.setup.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'

      - name: Set up Zig
        uses: mlugg/setup-zig@v2

      - name: Copy shared resources
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "📦 Copying shared resources..."
          mkdir -p resources
          if [ -f "../resources/crystal_cave_track.mp3" ]; then
            cp ../resources/crystal_cave_track.mp3 resources/
            echo "✅ Copied crystal_cave_track.mp3"
          else
            echo "⚠️  Shared resource crystal_cave_track.mp3 not found, skipping"
          fi

      - name: Setup deployment
        uses: ./.github/actions/build-zig-project
        id: setup
        with:
          project_dir: ${{ env.PROJECT_DIR }}
          itch_user: ${{ env.ITCH_USER }}
          itch_game: ${{ env.ITCH_GAME }}
          build_platform: web
          env: ${{ env.ENV }}
          channel: ${{ github.event.inputs.channel }}
          version_override: ${{ github.event.inputs.version }}
          butler_api_key: ${{ secrets.BUTLER_API_KEY }}
          deployment_only: 'true'
          publish_itch: ${{ env.PUBLISH_ITCH }}

      - name: Build WebAssembly version
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "🔨 Building WebAssembly version..."

          SYSROOT=$(emcc --cflags | grep -o '\--sysroot=[^ ]*' | cut -d= -f2)
          if [ -z "$SYSROOT" ]; then
            echo "❌ Error: Could not determine emcc sysroot"
            exit 1
          fi
          echo "Emscripten sysroot: $SYSROOT"

          zig build package -Dtarget=wasm32-emscripten -Doptimize=ReleaseSmall -Dsysroot_path="$SYSROOT"

          echo "✅ WebAssembly build complete"

      - name: Package web build
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "📦 Packaging web build..."
          ZIP_NAME="quickstart-zig-web.zip"

          if [ -d "zig-out/wasm" ]; then
            # Remove the auto-generated zip if present to avoid nesting
            rm -f zig-out/wasm/*_wasm.zip
            cd zig-out/wasm
            zip -r "../../${ZIP_NAME}" .
            cd ../..
          else
            echo "❌ Error: zig-out/wasm directory not found"
            exit 1
          fi

          echo "✅ Package created: ${ZIP_NAME}"

      - name: Push to itch.io (web)
        uses: ./.github/actions/build-zig-project
        with:
          project_dir: ${{ env.PROJECT_DIR }}
          itch_user: ${{ env.ITCH_USER }}
          itch_game: ${{ env.ITCH_GAME }}
          build_platform: web
          env: ${{ env.ENV }}
          channel: ${{ github.event.inputs.channel }}
          version_override: ${{ steps.setup.outputs.version || github.event.inputs.version }}
          butler_api_key: ${{ secrets.BUTLER_API_KEY }}
          package_file: quickstart-zig-web.zip
          deployment_only: 'true'
          publish_itch: ${{ env.PUBLISH_ITCH }}

      - name: Upload WASM zip artifact (S3 publish)
        if: env.PUBLISH_S3 == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-zig-wasm-zip
          path: ${{ env.PROJECT_DIR }}/quickstart-zig-web.zip
          if-no-files-found: error

      - name: Upload WASM exploded artifact (S3 publish)
        if: env.PUBLISH_S3 == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-zig-wasm-exploded
          path: ${{ env.PROJECT_DIR }}/zig-out/wasm/
          if-no-files-found: error

  build-and-push-macos:
    runs-on: macos-latest
    timeout-minutes: 45
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.build_platform == 'macos' ||
      github.event.inputs.build_platform == 'all'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2

      - name: Copy shared resources
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "📦 Copying shared resources..."
          mkdir -p resources
          if [ -f "../resources/crystal_cave_track.mp3" ]; then
            cp ../resources/crystal_cave_track.mp3 resources/
            echo "✅ Copied crystal_cave_track.mp3"
          else
            echo "⚠️  Shared resource crystal_cave_track.mp3 not found, skipping"
          fi

      - name: Setup deployment
        uses: ./.github/actions/build-zig-project
        id: setup
        with:
          project_dir: ${{ env.PROJECT_DIR }}
          itch_user: ${{ env.ITCH_USER }}
          itch_game: ${{ env.ITCH_GAME }}
          build_platform: macos
          env: ${{ env.ENV }}
          channel: ${{ github.event.inputs.channel }}
          version_override: ${{ github.event.inputs.version }}
          butler_api_key: ${{ secrets.BUTLER_API_KEY }}
          deployment_only: 'true'
          publish_itch: ${{ env.PUBLISH_ITCH }}

      - name: Build macOS executable
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "🔨 Building macOS executable..."
          # scripts/zig-build.sh retries after patch-raylib-xcode-mirror.sh if hexops git URL fails (repo removed from GitHub).
          bash scripts/zig-build.sh -Doptimize=ReleaseSafe

          # Ad-hoc codesign for Apple Silicon distribution
          # The linker-signed signature gets invalidated during zip/upload/download,
          # causing macOS kernel to SIGKILL the binary. A proper ad-hoc signature survives.
          codesign -s - -f zig-out/bin/raylib-quickstart-zig
          codesign --verify zig-out/bin/raylib-quickstart-zig
          echo "✅ Binary signed and verified"

          echo "✅ macOS executable build complete"

      - name: Package macOS build
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "📦 Packaging macOS build..."
          ZIP_NAME="quickstart-zig-macos.zip"
          rm -f "${ZIP_NAME}"

          if [ -d "zig-out/bin" ]; then
            cd zig-out/bin
            zip -r "../../${ZIP_NAME}" .
            cd ../..
          else
            echo "❌ Error: No build output directory found"
            exit 1
          fi

          echo "✅ Package created: ${ZIP_NAME}"

      - name: Push to itch.io (macOS)
        uses: ./.github/actions/build-zig-project
        with:
          project_dir: ${{ env.PROJECT_DIR }}
          itch_user: ${{ env.ITCH_USER }}
          itch_game: ${{ env.ITCH_GAME }}
          build_platform: macos
          env: ${{ env.ENV }}
          channel: ${{ github.event.inputs.channel }}
          version_override: ${{ steps.setup.outputs.version || github.event.inputs.version }}
          butler_api_key: ${{ secrets.BUTLER_API_KEY }}
          package_file: quickstart-zig-macos.zip
          deployment_only: 'true'
          publish_itch: ${{ env.PUBLISH_ITCH }}

      - name: Upload macOS zip artifact (S3 publish)
        if: env.PUBLISH_S3 == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-zig-macos-zip
          path: ${{ env.PROJECT_DIR }}/quickstart-zig-macos.zip
          if-no-files-found: error

  build-and-push-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.build_platform == 'windows' ||
      github.event.inputs.build_platform == 'all'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2

      - name: Copy shared resources
        working-directory: ${{ env.PROJECT_DIR }}
        shell: bash
        run: |
          echo "📦 Copying shared resources..."
          mkdir -p resources
          if [ -f "../resources/crystal_cave_track.mp3" ]; then
            cp ../resources/crystal_cave_track.mp3 resources/
            echo "✅ Copied crystal_cave_track.mp3"
          else
            echo "⚠️  Shared resource crystal_cave_track.mp3 not found, skipping"
          fi

      - name: Setup deployment
        uses: ./.github/actions/build-zig-project
        id: setup
        with:
          project_dir: ${{ env.PROJECT_DIR }}
          itch_user: ${{ env.ITCH_USER }}
          itch_game: ${{ env.ITCH_GAME }}
          build_platform: windows
          env: ${{ env.ENV }}
          channel: ${{ github.event.inputs.channel }}
          version_override: ${{ github.event.inputs.version }}
          butler_api_key: ${{ secrets.BUTLER_API_KEY }}
          deployment_only: 'true'
          publish_itch: ${{ env.PUBLISH_ITCH }}

      - name: Build Windows executable
        working-directory: ${{ env.PROJECT_DIR }}
        shell: bash
        run: |
          echo "🔨 Building Windows executable..."
          zig build -Doptimize=ReleaseSafe

          echo "✅ Windows executable build complete"

      - name: Package Windows build
        working-directory: ${{ env.PROJECT_DIR }}
        shell: pwsh
        run: |
          echo "📦 Packaging Windows build..."
          $ZIP_NAME = "quickstart-zig-windows.zip"

          if (Test-Path "zig-out\bin") {
            $SOURCE_DIR = "zig-out\bin"
          } else {
            Write-Host "❌ Error: No build output directory found"
            exit 1
          }

          Compress-Archive -Path "${SOURCE_DIR}\*" -DestinationPath $ZIP_NAME -Force
          echo "✅ Package created: $ZIP_NAME"

      - name: Push to itch.io (Windows)
        uses: ./.github/actions/build-zig-project
        with:
          project_dir: ${{ env.PROJECT_DIR }}
          itch_user: ${{ env.ITCH_USER }}
          itch_game: ${{ env.ITCH_GAME }}
          build_platform: windows
          env: ${{ env.ENV }}
          channel: ${{ github.event.inputs.channel }}
          version_override: ${{ steps.setup.outputs.version || github.event.inputs.version }}
          butler_api_key: ${{ secrets.BUTLER_API_KEY }}
          package_file: quickstart-zig-windows.zip
          deployment_only: 'true'
          publish_itch: ${{ env.PUBLISH_ITCH }}

      - name: Upload Windows zip artifact (S3 publish)
        if: env.PUBLISH_S3 == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-zig-windows-zip
          path: ${{ env.PROJECT_DIR }}/quickstart-zig-windows.zip
          if-no-files-found: error

  publish-s3:
    runs-on: ubuntu-latest
    needs: [resolve-publish-flags, build-and-push-web, build-and-push-macos, build-and-push-windows]
    if: |
      needs.resolve-publish-flags.outputs.publish_s3 == 'true' &&
      github.event_name != 'workflow_dispatch' &&
      needs.build-and-push-web.result == 'success' &&
      needs.build-and-push-macos.result == 'success' &&
      needs.build-and-push-windows.result == 'success'
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PUBLIC_SOFTWARE_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Upload zips, WASM tree, checksums, merge catalog
        env:
          BUCKET: ${{ secrets.S3_PUBLIC_SOFTWARE_BUCKET }}
          VERSION: ${{ needs.build-and-push-web.outputs.version }}
          GAME_KEY: ${{ env.S3_GAME_KEY }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          set -euo pipefail
          BUCKET="${BUCKET:-prod-nicapotato-public-software}"
          GAME="${GAME_KEY}"
          VER="${VERSION}"
          REGION="${AWS_REGION}"
          BASE="https://${BUCKET}.s3.${REGION}.amazonaws.com"
          CATEGORY="${{ env.S3_CATEGORY }}"
          MATURITY="${{ env.S3_MATURITY }}"
          PREFIX="${CATEGORY}/${MATURITY}/${GAME}/${VER}"
          CATALOG_KEY="${CATEGORY}/${MATURITY}/catalog.json"

          WZIP="dist/quickstart-zig-wasm-zip/quickstart-zig-web.zip"
          MZIP="dist/quickstart-zig-macos-zip/quickstart-zig-macos.zip"
          WINZIP="dist/quickstart-zig-windows-zip/quickstart-zig-windows.zip"
          WDIR="dist/quickstart-zig-wasm-exploded"

          test -f "$WZIP" && test -f "$MZIP" && test -f "$WINZIP" && test -d "$WDIR"

          aws s3 cp "$WZIP" "s3://${BUCKET}/${PREFIX}/quickstart-zig-wasm.zip"
          aws s3 cp "$MZIP" "s3://${BUCKET}/${PREFIX}/quickstart-zig-macos.zip"
          aws s3 cp "$WINZIP" "s3://${BUCKET}/${PREFIX}/quickstart-zig-windows.zip"

          sha256sum "$WZIP" | awk '{print $1 "  quickstart-zig-wasm.zip"}' | aws s3 cp - "s3://${BUCKET}/${PREFIX}/quickstart-zig-wasm.zip.sha256" --content-type text/plain
          sha256sum "$MZIP" | awk '{print $1 "  quickstart-zig-macos.zip"}' | aws s3 cp - "s3://${BUCKET}/${PREFIX}/quickstart-zig-macos.zip.sha256" --content-type text/plain
          sha256sum "$WINZIP" | awk '{print $1 "  quickstart-zig-windows.zip"}' | aws s3 cp - "s3://${BUCKET}/${PREFIX}/quickstart-zig-windows.zip.sha256" --content-type text/plain

          cd "$WDIR"
          find . -type f | while IFS= read -r f; do
            rel="${f#./}"
            case "$rel" in
              *.html) ct=text/html ;;
              *.js)   ct=application/javascript ;;
              *.wasm) ct=application/wasm ;;
              *.data) ct=application/octet-stream ;;
              *.png)  ct=image/png ;;
              *.jpg|*.jpeg) ct=image/jpeg ;;
              *.json) ct=application/json ;;
              *)      ct=application/octet-stream ;;
            esac
            aws s3 cp "$f" "s3://${BUCKET}/${PREFIX}/wasm/${rel}" --content-type "$ct"
          done
          cd - >/dev/null

          SHA_W=$(sha256sum "$WZIP" | awk '{print $1}')
          SHA_M=$(sha256sum "$MZIP" | awk '{print $1}')
          SHA_WIN=$(sha256sum "$WINZIP" | awk '{print $1}')
          RELEASED="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          if ! aws s3 cp "s3://${BUCKET}/${CATALOG_KEY}" catalog.json 2>/dev/null; then
            echo '{"games":{}}' > catalog.json
          fi

          NEW=$(jq -n \
            --arg released "$RELEASED" \
            --arg mat "$MATURITY" \
            --arg cat "$CATEGORY" \
            --arg iw "${{ env.S3_IFRAME_WIDTH }}" \
            --arg ih "${{ env.S3_IFRAME_HEIGHT }}" \
            --arg wasm_zip "${BASE}/${PREFIX}/quickstart-zig-wasm.zip" \
            --arg sha_wasm "$SHA_W" \
            --arg mac_zip "${BASE}/${PREFIX}/quickstart-zig-macos.zip" \
            --arg sha_mac "$SHA_M" \
            --arg win_zip "${BASE}/${PREFIX}/quickstart-zig-windows.zip" \
            --arg sha_win "$SHA_WIN" \
            --arg play_wasm "${BASE}/${PREFIX}/wasm/index.html" \
            '{
              maturity: $mat,
              category: $cat,
              released_at: $released,
              iframe: {width: ($iw | tonumber), height: ($ih | tonumber)},
              platforms: {
                wasm: {zip_url: $wasm_zip, sha256: $sha_wasm, play_url: $play_wasm},
                macos: {zip_url: $mac_zip, sha256: $sha_mac},
                windows: {zip_url: $win_zip, sha256: $sha_win}
              }
            }')

          jq --arg game "$GAME" --arg ver "$VER" --argjson entry "$NEW" \
            --arg dn "${{ env.S3_DISPLAY_NAME }}" \
            --arg mat "$MATURITY" \
            --arg cat "$CATEGORY" \
            '.games //= {}
            | .games[$game] //= {display_name: $dn, maturity: $mat, category: $cat, versions: {}}
            | .games[$game].versions //= {}
            | .games[$game].versions[$ver] = $entry
            | .games[$game].maturity = $mat | .games[$game].category = $cat' catalog.json > catalog.merged.json

          aws s3 cp catalog.merged.json "s3://${BUCKET}/${CATALOG_KEY}" --content-type application/json
          echo "✅ Published prototype to s3://${BUCKET}/${PREFIX}/ and updated ${CATALOG_KEY}"
