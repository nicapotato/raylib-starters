<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raylib Quickstart Rust - WASM</title>
    <style>
        * { margin: 0; padding: 0; }
        body {
            background: #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #eee;
        }
        #header {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        h1 { font-size: 18px; font-weight: 500; }
        #btn-audio {
            padding: 6px 14px;
            border: 1px solid #555;
            border-radius: 4px;
            background: #333;
            color: #eee;
            cursor: pointer;
            font-size: 13px;
        }
        #btn-audio:hover { background: #444; }
        canvas.emscripten {
            border: 0;
            background: black;
        }
        #status {
            margin-top: 10px;
            font-size: 13px;
            color: #999;
        }
        #spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid #555;
            border-top: 3px solid #e44;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>Raylib Quickstart Rust</h1>
        <button id="btn-audio" onclick="toggleAudio()">Resume Audio</button>
    </div>

    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

    <div id="status"><span id="spinner"></span>Downloading...</div>

    <script>
        var statusElement = document.getElementById('status');
        var spinnerElement = document.getElementById('spinner');

        var Module = {
            print: function(text) { console.log(text); },
            printErr: function(text) { console.error(text); },
            canvas: document.getElementById('canvas'),
            setStatus: function(text) {
                if (!text) {
                    spinnerElement.style.display = 'none';
                    statusElement.textContent = '';
                } else {
                    statusElement.innerHTML = '<span id="spinner" style="display:inline-block;width:18px;height:18px;border:3px solid #555;border-top:3px solid #e44;border-radius:50%;animation:spin 0.8s linear infinite;margin-right:8px;vertical-align:middle;"></span>' + text;
                }
            },
            totalDependencies: 0,
            monitorRunDependencies: function(left) {
                this.totalDependencies = Math.max(this.totalDependencies, left);
                Module.setStatus(left
                    ? 'Preparing... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')'
                    : '');
            }
        };

        Module.setStatus('Downloading...');
        window.onerror = function() {
            Module.setStatus('Exception thrown, see JavaScript console');
        };

        // Audio context tracking for browser autoplay policy
        var audioContextList = [];
        (function() {
            self.AudioContext = new Proxy(self.AudioContext, {
                construct(target, args) {
                    var ctx = new target(...args);
                    audioContextList.push(ctx);
                    return ctx;
                }
            });
        })();

        function toggleAudio() {
            var btn = document.getElementById('btn-audio');
            var resumed = false;
            audioContextList.forEach(function(ctx) {
                if (ctx.state === 'suspended') { ctx.resume(); resumed = true; }
                else if (ctx.state === 'running') { ctx.suspend(); }
            });
            btn.textContent = resumed ? 'Suspend Audio' : 'Resume Audio';
        }
    </script>
    <script async src="raylib-quickstart-rust.js"></script>
</body>
</html>
